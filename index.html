<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scalbl Dashboard</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000000;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #e5e5e5;
  }
  .layout { display: flex; height: 100vh; }
  .sidebar {
    width: 230px;
    flex-shrink: 0;
    background: #0a0a0a;
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
  }
  .sidebar-brand {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    padding: 8px 12px 20px 12px;
    letter-spacing: 0.3px;
  }
  .nav-item {
    display: block;
    padding: 10px 12px;
    border-radius: 6px;
    color: #9a9a9a;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, color 0.15s;
  }
  .nav-item:hover { background: #141414; color: #ffffff; }
  .nav-item.active { background: #1a1a1a; color: #ffffff; }
  .main { flex: 1; overflow-y: auto; background: #000000; }
  .page { padding: 28px 32px; display: none; }
  .page.active { display: block; }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-title {
    font-size: 18px;
    color: #ffffff;
    margin: 0;
    letter-spacing: 0.5px;
  }
  .header-actions { display: flex; gap: 10px; }
  .btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #ffffff;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #242424; }
  .btn.subtle { color: #999999; }
  .btn.subtle:hover { color: #ffffff; }
  table.client-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .client-table th {
    text-align: left;
    color: #777777;
    font-weight: normal;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 14px;
    border-bottom: 1px solid #1e1e1e;
  }
  .client-table td {
    padding: 4px 8px;
    color: #d5d5d5;
    border-bottom: 1px solid #141414;
  }
  .client-table tbody tr:hover { background: #0d0d0d; }
  .cell-input {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: #d5d5d5;
    font-family: inherit;
    font-size: 13px;
    padding: 7px 6px;
    outline: none;
    transition: border-color 0.1s, background 0.1s;
  }
  .cell-input:hover { border-color: #2a2a2a; }
  .cell-input:focus { border-color: #444444; background: #0d0d0d; color: #ffffff; }
  .cell-input[type="date"] { color-scheme: dark; }
  .cell-input[type="number"] { -moz-appearance: textfield; }
  .cell-input[type="number"]::-webkit-inner-spin-button,
  .cell-input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  #mrr-footer td {
    padding: 10px 14px;
    border-top: 1px solid #2a2a2a;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .mrr-total-label { color: #666666; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
  .mrr-total-value { color: #ffffff; font-size: 14px; }
  .add-row td { padding: 8px 14px; border-bottom: 1px solid #1e1e1e; }
  .add-row input, .status-form input[type="text"] {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #222222;
    border-radius: 4px;
    color: #ffffff;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
  }
  .add-row input:focus, .status-form input[type="text"]:focus { border-color: #444444; }
  .add-row input[type="date"] { color-scheme: dark; }
  .add-row { display: none; }
  .add-row.open { display: table-row; }
  .empty-state { color: #555555; font-size: 12px; letter-spacing: 1px; padding: 30px 14px; }
  select.status-select {
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid;
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  select.status-select option { background: #111111; color: #e5e5e5; }
  .status-form {
    display: none;
    align-items: center;
    gap: 10px;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 18px;
  }
  .status-form.open { display: flex; }
  .status-form input[type="text"] { width: 200px; }
  .status-form input[type="color"] {
    width: 38px; height: 34px;
    background: #0d0d0d;
    border: 1px solid #222222;
    border-radius: 4px;
    padding: 2px;
    cursor: pointer;
  }
  .status-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .status-chip {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid;
    border-radius: 20px;
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-chip span { cursor: pointer; opacity: 0.6; }
  .status-chip span:hover { opacity: 1; }
  .row-delete {
    color: #444444;
    cursor: pointer;
    font-size: 14px;
    text-align: center;
  }
  .row-delete:hover { color: #f87171; }
  .save-indicator {
    font-size: 10px;
    color: #444444;
    letter-spacing: 1px;
    margin-top: 14px;
    text-transform: uppercase;
  }

  /* ---- settings page ---- */
  .settings-section {
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 24px;
    max-width: 560px;
  }
  .settings-section-title {
    font-size: 11px;
    color: #666666;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 16px 0;
  }
  .user-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #141414;
    font-size: 13px;
  }
  .user-row:last-child { border-bottom: none; }
  .user-email { color: #d5d5d5; }
  .user-badge {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #60a5fa;
    border: 1px solid rgba(96,165,250,0.3);
    border-radius: 20px;
    padding: 2px 8px;
    margin-left: 10px;
  }
  .settings-add-form {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .settings-add-form input {
    background: #0d0d0d;
    border: 1px solid #222222;
    border-radius: 4px;
    color: #ffffff;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    flex: 1;
    min-width: 160px;
  }
  .settings-add-form input:focus { border-color: #444444; }
  .settings-msg {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 10px;
    min-height: 16px;
  }
  .settings-msg.ok { color: #4ade80; }
  .settings-msg.err { color: #f87171; }

  /* ---- login overlay ---- */
  #login-overlay {
    position: fixed;
    inset: 0;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  #login-overlay.hidden { display: none; }
  .login-box {
    width: 320px;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .login-brand {
    font-size: 16px;
    color: #ffffff;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .login-box input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #222222;
    border-radius: 4px;
    color: #ffffff;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
  }
  .login-box input:focus { border-color: #444444; }
  .login-btn {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #ffffff;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }
  .login-btn:hover { background: #242424; }
  .login-error {
    font-size: 11px;
    color: #f87171;
    letter-spacing: 1px;
    min-height: 16px;
    text-transform: uppercase;
  }
  .logout-btn {
    background: none;
    border: none;
    color: #444444;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    padding: 8px 12px;
    text-transform: uppercase;
    text-align: left;
    border-radius: 6px;
    transition: color 0.15s;
  }
  .logout-btn:hover { color: #f87171; }

  /* ---- badge selects (client status page) ---- */
  select.badge-select {
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
  }
  select.badge-select option { background: #111111; color: #e5e5e5; font-weight: normal; }
  select.badge-select.ad-live    { background: #16a34a; color: #ffffff; }
  select.badge-select.ad-notlive { background: #dc2626; color: #ffffff; }
  select.badge-select.cs-active   { background: #16a34a; color: #ffffff; }
  select.badge-select.cs-inactive { background: #dc2626; color: #ffffff; }
  select.badge-select.cs-pif      { background: #ea580c; color: #ffffff; }
  select.badge-select.ts-todo       { background: #1d4ed8; color: #ffffff; }
  select.badge-select.ts-inprogress { background: #f97316; color: #ffffff; }
  select.badge-select.ts-done       { background: #16a34a; color: #ffffff; }
  .task-toggle { display: inline-block; cursor: pointer; color: #444444; font-size: 10px; margin-right: 8px; user-select: none; width: 10px; }
  .task-toggle:hover { color: #aaaaaa; }
  .subtask-row td { background: #060606; border-bottom: 1px solid #0f0f0f; }
  .subtask-row:hover td { background: #0c0c0c; }
  .subtask-indent { color: #2a2a2a; margin-right: 8px; font-size: 13px; }

  /* ---- pipeline board ---- */
  .pipeline-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .pipeline-toolbar-title { font-size: 15px; font-weight: 600; color: #ffffff; }
  .pipeline-toolbar-actions { display: flex; align-items: center; gap: 2px; }
  .pipeline-icon-btn {
    background: none;
    border: none;
    color: #555555;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 5px;
    font-size: 15px;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .pipeline-icon-btn:hover { background: #1a1a1a; color: #aaaaaa; }
  .pipeline-new-btn-wrap { display: flex; align-items: center; margin-left: 8px; }
  .pipeline-new-btn {
    background: #2563eb;
    border: none;
    color: #ffffff;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px 0 0 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .pipeline-new-btn:hover { background: #1d4ed8; }
  .pipeline-new-btn-caret {
    background: #2563eb;
    border: none;
    border-left: 1px solid rgba(255,255,255,0.2);
    color: #ffffff;
    font-family: inherit;
    font-size: 12px;
    padding: 7px 9px;
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .pipeline-new-btn-caret:hover { background: #1d4ed8; }
  .pipeline-board { display: flex; gap: 14px; align-items: flex-start; }
  .pipeline-col {
    flex: 1;
    min-width: 0;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 10px;
    padding: 16px;
  }
  .pipeline-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .pipeline-col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pipeline-col-name { font-size: 13px; font-weight: 500; color: #d5d5d5; }
  .pipeline-col-count { font-size: 13px; color: #555555; margin-left: 2px; }
  .pipeline-cards { display: flex; flex-direction: column; gap: 8px; min-height: 4px; }
  .pipeline-card {
    background: #141414;
    border: 1px solid #222222;
    border-radius: 7px;
    padding: 12px 32px 12px 14px;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .pipeline-card:hover { background: #1a1a1a; border-color: #333333; }
  .pipeline-card-title {
    outline: none;
    background: transparent;
    border: none;
    color: #d5d5d5;
    font-family: inherit;
    font-size: 13px;
    width: 100%;
    padding: 0;
  }
  .pipeline-card-del {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    color: #2a2a2a;
    cursor: pointer;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }
  .pipeline-card:hover .pipeline-card-del { opacity: 1; }
  .pipeline-card-del:hover { color: #f87171; }
  .pipeline-new-card {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #444444;
    font-size: 13px;
    cursor: pointer;
    padding: 10px 4px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    margin-top: 4px;
    user-select: none;
  }
  .pipeline-new-card:hover { color: #888888; background: #111111; }
  .pipeline-card.dragging { opacity: 0.35; }
  .pipeline-col.drag-over { border-color: #2563eb; background: #0d1829; }

  /* ---- pipeline status selectors ---- */
  .pipeline-card-statuses { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .pipeline-status-badge {
    display: inline-block;
    width: 11%;
    min-width: 28px;
    padding: 4px 0;
    border-radius: 3px;
    border: none;
    font-family: inherit;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    text-align: center;
    color: #ffffff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: filter 0.1s;
  }
  .pipeline-status-badge:hover { filter: brightness(1.15); }
  .pipeline-status-badge.ps-empty { background: #222222; color: #444444; }
  .pipeline-status-dropdown {
    position: fixed;
    background: #1c1c1e;
    border: 1px solid #333333;
    border-radius: 8px;
    padding: 6px 0;
    z-index: 9999;
    min-width: 200px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }
  .pipeline-sd-header {
    font-size: 10px;
    color: #666666;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 14px 10px;
  }
  .pipeline-sd-option {
    padding: 4px 10px;
    cursor: pointer;
  }
  .pipeline-sd-option:hover { background: rgba(255,255,255,0.04); }
  .pipeline-sd-option-bar {
    width: 100%;
    padding: 7px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    color: #ffffff;
    text-align: center;
  }
  .pipeline-sd-option-bar.ps-empty-bar { background: #2a2a2a; color: #555555; }
  .pipeline-sd-divider { height: 1px; background: #222222; margin: 6px 0; }
  .pipeline-sd-edit {
    font-size: 12px;
    color: #777777;
    padding: 7px 14px;
    cursor: pointer;
    transition: color 0.1s;
  }
  .pipeline-sd-edit:hover { color: #ffffff; }

  /* status field modal */
  .ps-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ps-modal-overlay.hidden { display: none; }
  .ps-modal {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px;
    width: 400px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
  }
  .ps-modal-title { font-size: 14px; font-weight: 600; color: #ffffff; margin-bottom: 18px; }
  .ps-modal-lbl { font-size: 11px; color: #666666; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .ps-modal-inp {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    color: #ffffff;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    margin-bottom: 16px;
  }
  .ps-modal-inp:focus { border-color: #444444; }
  .ps-options-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .ps-option-row { display: flex; align-items: center; gap: 8px; }
  .ps-color-pick {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    border: 1px solid #2a2a2a;
    cursor: pointer;
    padding: 2px;
    background: #0d0d0d;
    flex-shrink: 0;
  }
  .ps-option-inp {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    color: #ffffff;
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
  }
  .ps-option-inp:focus { border-color: #444444; }
  .ps-option-del { color: #333333; cursor: pointer; font-size: 18px; flex-shrink: 0; transition: color 0.1s; }
  .ps-option-del:hover { color: #f87171; }
  .ps-add-option-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    color: #579bfc;
    cursor: pointer;
    padding: 4px 0;
    margin-bottom: 18px;
  }
  .ps-add-option-btn:hover { color: #7ab5ff; }
  .ps-modal-footer { display: flex; align-items: center; gap: 8px; }
  .ps-modal-save {
    background: #2563eb;
    border: none;
    color: #ffffff;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ps-modal-save:hover { background: #1d4ed8; }
  .ps-modal-cancel {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #aaaaaa;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
  }
  .ps-modal-cancel:hover { color: #ffffff; }
  .ps-modal-delete {
    margin-left: auto;
    background: none;
    border: none;
    color: #f87171;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 0;
  }
  .ps-modal-delete:hover { text-decoration: underline; }
  /* card date + notes */
  .pipeline-card-meta { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .pipeline-card-date-row {
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .pipeline-card-date-label { font-size: 10px; color: #555555; letter-spacing: 0.5px; flex-shrink: 0; }
  .pipeline-card-date-text {
    font-size: 12px;
    color: #888888;
    cursor: pointer;
    border-bottom: 1px dashed transparent;
    transition: color 0.15s, border-color 0.15s;
    flex: 1;
  }
  .pipeline-card-date-text:hover { color: #aaaaaa; border-color: #444444; }
  .pipeline-card-date-text.has-date { color: #d5d5d5; }
  .pipeline-card-date-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
  }
  .pipeline-card-notes {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: #888888;
    font-family: inherit;
    font-size: 12px;
    resize: none;
    outline: none;
    padding: 0;
    line-height: 1.5;
    min-height: 18px;
    transition: border-color 0.15s, color 0.15s;
    overflow: hidden;
  }
  .pipeline-card-notes:hover { border-color: #2a2a2a; }
  .pipeline-card-notes:focus { border-color: #444444; color: #d5d5d5; }
  .pipeline-card-notes::placeholder { color: #3a3a3a; }
  .pipeline-add-status-field-btn {
    background: none;
    border: 1px dashed #2a2a2a;
    border-radius: 6px;
    color: #555555;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 8px 14px;
    margin-top: 16px;
    transition: border-color 0.15s, color 0.15s;
    display: block;
  }
  .pipeline-add-status-field-btn:hover { border-color: #444444; color: #aaaaaa; }
</style>
</head>
<body>
<div id="login-overlay">
  <div class="login-box">
    <div class="login-brand">Scalbl</div>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-submit">Login</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">Scalbl</div>
    <nav>
      <div class="nav-item active" data-page="clients">Client List</div>
      <div class="nav-item" data-page="client-status">Client Status</div>
      <div class="nav-item" data-page="task-list">Task List</div>
      <div class="nav-item" data-page="pipeline">Pipeline</div>
      <div class="nav-item" data-page="settings">Settings</div>
    </nav>
    <button class="logout-btn" id="logout-btn" style="margin-top:auto">Logout</button>
  </aside>
  <main class="main" id="main">

    <!-- Client List page -->
    <div class="page active" id="page-clients">
      <div class="page-header">
        <h1 class="page-title">Client List</h1>
        <div class="header-actions">
          <button class="btn subtle" id="undo-btn" disabled>↩ Undo</button>
          <button class="btn subtle" id="redo-btn" disabled>↪ Redo</button>
          <button class="btn subtle" id="add-status-btn">+ Add Status</button>
          <button class="btn" id="add-client-btn">+ Add Client</button>
        </div>
      </div>

      <div class="status-form" id="status-form">
        <input type="text" id="status-name" placeholder="Status name">
        <input type="color" id="status-color" value="#a855f7">
        <button class="btn" id="status-save">Save Status</button>
        <div class="status-chips" id="status-chips"></div>
      </div>

      <table class="client-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
            <th>Date</th>
            <th>Status</th>
            <th>MRR</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="add-row" id="add-row">
            <td><input id="in-name" placeholder="Name"></td>
            <td><input id="in-email" placeholder="Email"></td>
            <td><input id="in-phone" placeholder="Phone Number"></td>
            <td><input id="in-date" type="date"></td>
            <td><select id="in-status" class="status-select"></select></td>
            <td><input id="in-mrr" type="number" min="0" step="0.01" placeholder="0"></td>
            <td></td>
          </tr>
        </tbody>
        <tbody id="client-rows"></tbody>
        <tfoot id="mrr-footer"></tfoot>
      </table>
      <div class="save-indicator" id="save-indicator"></div>
    </div>

    <!-- Client Status page -->
    <div class="page" id="page-client-status">
      <div class="page-header">
        <h1 class="page-title">Client Status</h1>
      </div>
      <table class="client-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Ad Status</th>
            <th>Client Status</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="client-status-rows"></tbody>
      </table>
    </div>

    <!-- Task List page -->
    <div class="page" id="page-task-list">
      <div class="page-header">
        <h1 class="page-title">Task List</h1>
        <div class="header-actions">
          <button class="btn" id="add-task-btn">+ Add Task</button>
        </div>
      </div>
      <table class="client-table">
        <thead>
          <tr>
            <th>Task</th>
            <th>Status</th>
            <th>Client</th>
            <th>Date Due</th>
            <th>Notes</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="add-row" id="task-add-row">
            <td><input id="t-task" placeholder="Task"></td>
            <td><select id="t-status" class="badge-select ts-todo">
              <option value="To Do">To Do</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select></td>
            <td><select id="t-client" style="width:100%;background:#0d0d0d;border:1px solid #222;border-radius:4px;color:#e5e5e5;font-family:inherit;font-size:13px;padding:8px 10px;outline:none;"></select></td>
            <td><input id="t-date" type="date"></td>
            <td><input id="t-notes" placeholder="Notes"></td>
            <td></td>
          </tr>
        </tbody>
        <tbody id="task-rows"></tbody>
      </table>
    </div>

    <!-- Settings page -->
    <div class="page" id="page-pipeline">
      <div class="page-header">
        <h1 class="page-title">Pipeline</h1>
      </div>
      <div class="pipeline-toolbar">
        <span class="pipeline-toolbar-title">Pipeline</span>
        <div class="pipeline-toolbar-actions">
          <button class="pipeline-icon-btn" title="Filter">&#8801;</button>
          <button class="pipeline-icon-btn" title="Sort">&#8645;</button>
          <button class="pipeline-icon-btn" title="Automate">&#9889;</button>
          <button class="pipeline-icon-btn" title="AI">&#10022;</button>
          <button class="pipeline-icon-btn" title="Search">&#9906;</button>
          <button class="pipeline-icon-btn" title="Fullscreen">&#10548;</button>
          <button class="pipeline-icon-btn" title="Settings">&#9881;</button>
          <div class="pipeline-new-btn-wrap">
            <button class="pipeline-new-btn" id="pipeline-new-btn">New</button>
            <button class="pipeline-new-btn-caret" id="pipeline-new-caret">&#9662;</button>
          </div>
        </div>
      </div>
      <div class="pipeline-board" id="pipeline-board"></div>
      <button class="pipeline-add-status-field-btn" id="pipeline-add-status-btn">+ Add Status Column</button>
    </div>

    <!-- Pipeline status field modal -->
    <div class="ps-modal-overlay hidden" id="ps-modal-overlay">
      <div class="ps-modal">
        <div class="ps-modal-title" id="ps-modal-title">Add Status Column</div>
        <div class="ps-modal-lbl">Column Label</div>
        <input class="ps-modal-inp" id="ps-modal-field-label" placeholder="e.g. Decision Maker">
        <div class="ps-modal-lbl">Options</div>
        <div class="ps-options-list" id="ps-options-list"></div>
        <button class="ps-add-option-btn" id="ps-add-option-btn">+ Add option</button>
        <div class="ps-modal-footer">
          <button class="ps-modal-save" id="ps-modal-save">Save</button>
          <button class="ps-modal-cancel" id="ps-modal-cancel">Cancel</button>
          <button class="ps-modal-delete hidden" id="ps-modal-delete">Delete column</button>
        </div>
      </div>

    <div class="page" id="page-settings">
      <div class="page-header">
        <h1 class="page-title">Settings</h1>
      </div>

      <div class="settings-section">
        <p class="settings-section-title">Users</p>
        <div id="user-list"></div>
        <div class="settings-add-form">
          <input type="email" id="new-user-email" placeholder="Email">
          <input type="password" id="new-user-password" placeholder="Password">
          <button class="btn" id="add-user-btn">+ Add User</button>
        </div>
        <div class="settings-msg" id="settings-msg"></div>
      </div>
    </div>

  </main>
</div>

<script>
  const STORAGE_KEY  = 'scalbl-dashboard-v1';
  const USERS_KEY    = 'scalbl-users-v1';
  const SESSION_KEY  = 'scalbl-auth';

  // ---- users storage (localStorage) ----
  const DEFAULT_USERS = [
    { email: 'henryfortunatow@gmail.com', password: 'Bygodiam123!!', admin: true }
  ];

  function loadUsers() {
    try {
      const raw = localStorage.getItem(USERS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return DEFAULT_USERS.map(u => Object.assign({}, u));
  }

  function saveUsers(users) {
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
  }

  // ---- app state (localStorage) ----
  let state = {
    statuses: [
      { name: 'Pending', color: '#f5b73d' },
      { name: 'Closed',  color: '#4ade80' },
      { name: 'List',    color: '#60a5fa' }
    ],
    clients: [],
    tasks: [],
    pipeline: [],
    pipelineStatusFields: []
  };

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.statuses && saved.clients) {
          state = saved;
          if (!state.tasks) state.tasks = [];
          if (!state.pipeline) state.pipeline = [];
          if (!state.pipelineStatusFields) state.pipelineStatusFields = [];
        }
      }
    } catch (e) {}
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setIndicator('Saved');
    } catch (e) {
      setIndicator('Save failed');
    }
  }

  function setIndicator(text) {
    document.getElementById('save-indicator').textContent = text;
  }

  // ---- undo history ----
  const undoStack = [];
  const redoStack = [];
  const MAX_HISTORY = 50;

  function pushHistory() {
    undoStack.push(JSON.stringify(state));
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack.length = 0;
    document.getElementById('undo-btn').disabled = false;
    document.getElementById('redo-btn').disabled = true;
  }

  function undo() {
    if (!undoStack.length) return;
    redoStack.push(JSON.stringify(state));
    state = JSON.parse(undoStack.pop());
    saveState();
    render();
    document.getElementById('undo-btn').disabled = !undoStack.length;
    document.getElementById('redo-btn').disabled = false;
  }

  function redo() {
    if (!redoStack.length) return;
    undoStack.push(JSON.stringify(state));
    state = JSON.parse(redoStack.pop());
    saveState();
    render();
    document.getElementById('undo-btn').disabled = false;
    document.getElementById('redo-btn').disabled = !redoStack.length;
  }

  // ---- helpers ----
  function hexToRgba(hex, alpha) {
    const v = hex.replace('#','');
    const r = parseInt(v.substring(0,2),16);
    const g = parseInt(v.substring(2,4),16);
    const b = parseInt(v.substring(4,6),16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function styleStatusSelect(sel, statusName) {
    const st = state.statuses.find(s => s.name === statusName) || state.statuses[0];
    if (!st) return;
    sel.style.color = st.color;
    sel.style.background = hexToRgba(st.color, 0.12);
    sel.style.borderColor = hexToRgba(st.color, 0.4);
  }

  function fillStatusOptions(sel, selected) {
    sel.innerHTML = '';
    state.statuses.forEach(s => {
      const o = document.createElement('option');
      o.value = s.name;
      o.textContent = s.name;
      if (s.name === selected) o.selected = true;
      sel.appendChild(o);
    });
    styleStatusSelect(sel, sel.value);
  }

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatAU(iso) {
    if (!iso) return '';
    const parts = iso.split('-');
    if (parts.length !== 3) return iso;
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  // ---- nav ----
  const pages = document.querySelectorAll('.page');
  const navItems = document.querySelectorAll('.nav-item');

  function showPage(name) {
    pages.forEach(p => p.classList.toggle('active', p.id === 'page-' + name));
    navItems.forEach(n => n.classList.toggle('active', n.dataset.page === name));
    if (name === 'settings') renderUserList();
    if (name === 'client-status') renderClientStatus();
    if (name === 'task-list') renderTasks();
    if (name === 'pipeline') renderPipeline();
  }

  navItems.forEach(n => n.addEventListener('click', () => showPage(n.dataset.page)));

  // ---- render clients ----
  const rowsBody = document.getElementById('client-rows');

  function applyAdStatusStyle(sel) {
    sel.className = 'badge-select ' + (sel.value === 'Live' ? 'ad-live' : 'ad-notlive');
  }

  function applyClientStatusStyle(sel) {
    const map = { Active: 'cs-active', Inactive: 'cs-inactive', PIF: 'cs-pif' };
    sel.className = 'badge-select ' + (map[sel.value] || 'cs-active');
  }

  function renderClientStatus() {
    const tbody = document.getElementById('client-status-rows');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (state.clients.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="empty-state" colspan="4">No clients yet — add them in Client List</td>';
      tbody.appendChild(tr);
      return;
    }
    state.clients.forEach((c, idx) => {
      const tr = document.createElement('tr');

      const tdName = document.createElement('td');
      tdName.textContent = c.name || '—';
      tdName.style.color = '#d5d5d5';
      tr.appendChild(tdName);

      // Ad Status
      const tdAd = document.createElement('td');
      const adSel = document.createElement('select');
      adSel.innerHTML = '<option value="Live">Live</option><option value="Not Live">Not Live</option>';
      adSel.value = c.adStatus || 'Not Live';
      applyAdStatusStyle(adSel);
      adSel.addEventListener('change', () => {
        pushHistory();
        state.clients[idx].adStatus = adSel.value;
        applyAdStatusStyle(adSel);
        saveState();
      });
      tdAd.appendChild(adSel);
      tr.appendChild(tdAd);

      // Client Status
      const tdCs = document.createElement('td');
      const csSel = document.createElement('select');
      csSel.innerHTML = '<option value="Active">Active</option><option value="Inactive">Inactive</option><option value="PIF">PIF</option>';
      csSel.value = c.clientStatus || 'Active';
      applyClientStatusStyle(csSel);
      csSel.addEventListener('change', () => {
        pushHistory();
        state.clients[idx].clientStatus = csSel.value;
        applyClientStatusStyle(csSel);
        saveState();
      });
      tdCs.appendChild(csSel);
      tr.appendChild(tdCs);

      // Notes
      const tdNotes = document.createElement('td');
      const notesInput = document.createElement('input');
      notesInput.type = 'text';
      notesInput.value = c.notes || '';
      notesInput.placeholder = 'Add a note…';
      notesInput.style.cssText = 'background:transparent;border:none;border-bottom:1px solid #444;color:#d5d5d5;width:100%;padding:2px 4px;outline:none;font-size:0.85rem;';
      notesInput.addEventListener('change', () => {
        pushHistory();
        state.clients[idx].notes = notesInput.value;
        saveState();
      });
      tdNotes.appendChild(notesInput);
      tr.appendChild(tdNotes);

      tbody.appendChild(tr);
    });
  }

  function applyTaskStatusStyle(sel) {
    const map = { 'To Do': 'ts-todo', 'In Progress': 'ts-inprogress', 'Done': 'ts-done' };
    sel.className = 'badge-select ' + (map[sel.value] || 'ts-todo');
  }

  function fillClientOptions(sel, selected) {
    const prev = sel.value;
    sel.innerHTML = '<option value="">— No Client —</option>';
    state.clients.forEach(c => {
      const o = document.createElement('option');
      o.value = c.name;
      o.textContent = c.name;
      if (c.name === (selected !== undefined ? selected : prev)) o.selected = true;
      sel.appendChild(o);
    });
  }

  function renderTasks() {
    const tbody = document.getElementById('task-rows');
    if (!tbody) return;
    tbody.innerHTML = '';

    const tClientSel = document.getElementById('t-client');
    if (tClientSel) fillClientOptions(tClientSel, tClientSel.value);

    if (state.tasks.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="empty-state" colspan="6">No tasks yet — click + Add Task</td>';
      tbody.appendChild(tr);
      return;
    }

    state.tasks.forEach((t, idx) => {
      if (!t.subtasks) t.subtasks = [];

      // --- Main task row ---
      const tr = document.createElement('tr');

      // Task (with expand toggle)
      const tdTask = document.createElement('td');
      const toggle = document.createElement('span');
      toggle.className = 'task-toggle';
      toggle.textContent = t.expanded ? '▼' : '▶';
      toggle.addEventListener('click', () => {
        state.tasks[idx].expanded = !state.tasks[idx].expanded;
        saveState();
        renderTasks();
      });
      tdTask.appendChild(toggle);
      const taskInp = document.createElement('input');
      taskInp.type = 'text';
      taskInp.className = 'cell-input';
      taskInp.style.width = 'calc(100% - 22px)';
      taskInp.value = t.task || '';
      taskInp.addEventListener('blur', () => {
        const val = taskInp.value.trim();
        if (val === t.task) return;
        pushHistory();
        state.tasks[idx].task = val;
        saveState();
      });
      taskInp.addEventListener('keydown', e => { if (e.key === 'Enter') taskInp.blur(); });
      tdTask.appendChild(taskInp);
      tr.appendChild(tdTask);

      // Status
      const tdStatus = document.createElement('td');
      const statusSel = document.createElement('select');
      statusSel.innerHTML = '<option value="To Do">To Do</option><option value="In Progress">In Progress</option><option value="Done">Done</option>';
      statusSel.value = t.taskStatus || 'To Do';
      applyTaskStatusStyle(statusSel);
      statusSel.addEventListener('change', () => {
        pushHistory();
        state.tasks[idx].taskStatus = statusSel.value;
        applyTaskStatusStyle(statusSel);
        saveState();
      });
      tdStatus.appendChild(statusSel);
      tr.appendChild(tdStatus);

      // Client
      const tdClient = document.createElement('td');
      const clientSel = document.createElement('select');
      clientSel.style.cssText = 'width:100%;background:#111;border:1px solid #2a2a2a;border-radius:4px;color:#aaaaaa;font-family:inherit;font-size:12px;padding:5px 8px;outline:none;cursor:pointer;';
      fillClientOptions(clientSel, t.client || '');
      clientSel.addEventListener('change', () => {
        pushHistory();
        state.tasks[idx].client = clientSel.value;
        saveState();
      });
      tdClient.appendChild(clientSel);
      tr.appendChild(tdClient);

      // Date Due
      const tdDate = document.createElement('td');
      const dateInp = document.createElement('input');
      dateInp.type = 'date';
      dateInp.className = 'cell-input';
      dateInp.value = t.dateDue || '';
      dateInp.addEventListener('change', () => {
        pushHistory();
        state.tasks[idx].dateDue = dateInp.value;
        saveState();
      });
      tdDate.appendChild(dateInp);
      tr.appendChild(tdDate);

      // Notes
      const tdNotes = document.createElement('td');
      const notesInp = document.createElement('input');
      notesInp.type = 'text';
      notesInp.className = 'cell-input';
      notesInp.value = t.notes || '';
      notesInp.placeholder = 'Add a note…';
      notesInp.addEventListener('blur', () => {
        const val = notesInp.value;
        if (val === t.notes) return;
        pushHistory();
        state.tasks[idx].notes = val;
        saveState();
      });
      notesInp.addEventListener('keydown', e => { if (e.key === 'Enter') notesInp.blur(); });
      tdNotes.appendChild(notesInp);
      tr.appendChild(tdNotes);

      // Delete
      const tdDel = document.createElement('td');
      tdDel.className = 'row-delete';
      tdDel.textContent = 'x';
      tdDel.title = 'Delete task';
      tdDel.addEventListener('click', () => {
        pushHistory();
        state.tasks.splice(idx, 1);
        saveState();
        renderTasks();
      });
      tr.appendChild(tdDel);
      tbody.appendChild(tr);

      // --- Subtask rows (shown when expanded) ---
      if (t.expanded) {
        t.subtasks.forEach((st, sidx) => {
          const str = document.createElement('tr');
          str.className = 'subtask-row';

          // Indented task cell
          const stTdTask = document.createElement('td');
          const indent = document.createElement('span');
          indent.className = 'subtask-indent';
          indent.textContent = '↳';
          stTdTask.appendChild(indent);
          const stTaskInp = document.createElement('input');
          stTaskInp.type = 'text';
          stTaskInp.className = 'cell-input';
          stTaskInp.style.width = 'calc(100% - 24px)';
          stTaskInp.value = st.task || '';
          stTaskInp.addEventListener('blur', () => {
            const val = stTaskInp.value.trim();
            if (val === st.task) return;
            pushHistory();
            state.tasks[idx].subtasks[sidx].task = val;
            saveState();
          });
          stTaskInp.addEventListener('keydown', e => { if (e.key === 'Enter') stTaskInp.blur(); });
          stTdTask.appendChild(stTaskInp);
          str.appendChild(stTdTask);

          // Status
          const stTdStatus = document.createElement('td');
          const stStatusSel = document.createElement('select');
          stStatusSel.innerHTML = '<option value="To Do">To Do</option><option value="In Progress">In Progress</option><option value="Done">Done</option>';
          stStatusSel.value = st.taskStatus || 'To Do';
          applyTaskStatusStyle(stStatusSel);
          stStatusSel.addEventListener('change', () => {
            pushHistory();
            state.tasks[idx].subtasks[sidx].taskStatus = stStatusSel.value;
            applyTaskStatusStyle(stStatusSel);
            saveState();
          });
          stTdStatus.appendChild(stStatusSel);
          str.appendChild(stTdStatus);

          // Empty Client cell
          str.appendChild(document.createElement('td'));

          // Date Due
          const stTdDate = document.createElement('td');
          const stDateInp = document.createElement('input');
          stDateInp.type = 'date';
          stDateInp.className = 'cell-input';
          stDateInp.value = st.dateDue || '';
          stDateInp.addEventListener('change', () => {
            pushHistory();
            state.tasks[idx].subtasks[sidx].dateDue = stDateInp.value;
            saveState();
          });
          stTdDate.appendChild(stDateInp);
          str.appendChild(stTdDate);

          // Notes
          const stTdNotes = document.createElement('td');
          const stNotesInp = document.createElement('input');
          stNotesInp.type = 'text';
          stNotesInp.className = 'cell-input';
          stNotesInp.value = st.notes || '';
          stNotesInp.placeholder = 'Add a note…';
          stNotesInp.addEventListener('blur', () => {
            const val = stNotesInp.value;
            if (val === st.notes) return;
            pushHistory();
            state.tasks[idx].subtasks[sidx].notes = val;
            saveState();
          });
          stNotesInp.addEventListener('keydown', e => { if (e.key === 'Enter') stNotesInp.blur(); });
          stTdNotes.appendChild(stNotesInp);
          str.appendChild(stTdNotes);

          // Delete subtask
          const stTdDel = document.createElement('td');
          stTdDel.className = 'row-delete';
          stTdDel.textContent = 'x';
          stTdDel.title = 'Delete subtask';
          stTdDel.addEventListener('click', () => {
            pushHistory();
            state.tasks[idx].subtasks.splice(sidx, 1);
            saveState();
            renderTasks();
          });
          str.appendChild(stTdDel);
          tbody.appendChild(str);
        });

        // Add-subtask input row
        const addStr = document.createElement('tr');
        addStr.className = 'subtask-row';
        const addStTd = document.createElement('td');
        addStTd.colSpan = 5;
        addStTd.style.paddingLeft = '28px';
        const addStInp = document.createElement('input');
        addStInp.type = 'text';
        addStInp.className = 'cell-input';
        addStInp.placeholder = '+ Add subtask…';
        addStInp.style.color = '#555555';
        addStInp.addEventListener('keydown', e => {
          if (e.key === 'Enter' && addStInp.value.trim()) {
            pushHistory();
            state.tasks[idx].subtasks.push({ task: addStInp.value.trim(), taskStatus: 'To Do', dateDue: '', notes: '' });
            saveState();
            renderTasks();
          }
        });
        addStTd.appendChild(addStInp);
        addStr.appendChild(addStTd);
        addStr.appendChild(document.createElement('td'));
        tbody.appendChild(addStr);
      }
    });
  }

  function renderMRRFooter() {
    const footer = document.getElementById('mrr-footer');
    footer.innerHTML = '';
    if (state.clients.length === 0) return;
    const total = state.clients.reduce((sum, c) => sum + (parseFloat(c.mrr) || 0), 0);
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td colspan="5" class="mrr-total-label">Total MRR</td>' +
      '<td class="mrr-total-value">$' + total.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '</td>' +
      '<td></td>';
    footer.appendChild(tr);
  }

  function render() {
    rowsBody.innerHTML = '';
    if (state.clients.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td class="empty-state" colspan="7">No clients yet</td>';
      rowsBody.appendChild(tr);
    } else {
      state.clients.forEach((c, idx) => {
        const tr = document.createElement('tr');

        // editable text fields
        [['name','text'], ['email','email'], ['phone','tel']].forEach(([field, type]) => {
          const td = document.createElement('td');
          const inp = document.createElement('input');
          inp.type = type;
          inp.className = 'cell-input';
          inp.value = c[field];
          inp.addEventListener('blur', () => {
            const val = inp.value.trim();
            if (val === c[field]) return;
            pushHistory();
            state.clients[idx][field] = val;
            saveState();
          });
          inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
          td.appendChild(inp);
          tr.appendChild(td);
        });

        // editable date field
        const tdDate = document.createElement('td');
        const dateInp = document.createElement('input');
        dateInp.type = 'date';
        dateInp.className = 'cell-input';
        dateInp.value = c.date;
        dateInp.addEventListener('change', () => {
          pushHistory();
          state.clients[idx].date = dateInp.value;
          saveState();
        });
        tdDate.appendChild(dateInp);
        tr.appendChild(tdDate);
        const tdStatus = document.createElement('td');
        const sel = document.createElement('select');
        sel.className = 'status-select';
        fillStatusOptions(sel, c.status);
        sel.addEventListener('change', () => {
          pushHistory();
          state.clients[idx].status = sel.value;
          styleStatusSelect(sel, sel.value);
          saveState();
        });
        tdStatus.appendChild(sel);
        tr.appendChild(tdStatus);

        // editable MRR field
        const tdMRR = document.createElement('td');
        const mrrInp = document.createElement('input');
        mrrInp.type = 'number';
        mrrInp.min = '0';
        mrrInp.step = '0.01';
        mrrInp.className = 'cell-input';
        mrrInp.value = c.mrr || '';
        mrrInp.placeholder = '0';
        mrrInp.addEventListener('blur', () => {
          const val = parseFloat(mrrInp.value) || 0;
          if (val === (parseFloat(c.mrr) || 0)) return;
          pushHistory();
          state.clients[idx].mrr = val;
          saveState();
          renderMRRFooter();
        });
        mrrInp.addEventListener('keydown', e => { if (e.key === 'Enter') mrrInp.blur(); });
        tdMRR.appendChild(mrrInp);
        tr.appendChild(tdMRR);

        const tdDel = document.createElement('td');
        tdDel.className = 'row-delete';
        tdDel.textContent = 'x';
        tdDel.title = 'Delete row';
        tdDel.addEventListener('click', () => {
          pushHistory();
          state.clients.splice(idx, 1);
          saveState();
          render();
        });
        tr.appendChild(tdDel);

        rowsBody.appendChild(tr);
      });
    }
    renderStatusChips();
    renderMRRFooter();
    renderClientStatus();
    renderTasks();
    fillStatusOptions(inStatus, inStatus.value || (state.statuses[0] && state.statuses[0].name));
  }

  function renderStatusChips() {
    const wrap = document.getElementById('status-chips');
    wrap.innerHTML = '';
    state.statuses.forEach((s, idx) => {
      const chip = document.createElement('div');
      chip.className = 'status-chip';
      chip.style.color = s.color;
      chip.style.background = hexToRgba(s.color, 0.12);
      chip.style.borderColor = hexToRgba(s.color, 0.4);
      chip.textContent = s.name;
      const del = document.createElement('span');
      del.textContent = 'x';
      del.title = 'Remove status';
      del.addEventListener('click', () => {
        const usedBy = state.clients.filter(c => c.status === s.name).length;
        if (usedBy > 0) {
          const ok = confirm('Status "' + s.name + '" is used by ' + usedBy + ' client(s). Delete it anyway? Those clients will be moved to the first remaining status.');
          if (!ok) return;
        }
        pushHistory();
        state.statuses.splice(idx, 1);
        const fallback = state.statuses[0] ? state.statuses[0].name : '';
        state.clients.forEach(c => {
          if (c.status === s.name) c.status = fallback;
        });
        saveState();
        render();
      });
      chip.appendChild(del);
      wrap.appendChild(chip);
    });
  }

  // ---- add client ----
  const addBtn = document.getElementById('add-client-btn');
  const addRow = document.getElementById('add-row');
  const inName   = document.getElementById('in-name');
  const inEmail  = document.getElementById('in-email');
  const inPhone  = document.getElementById('in-phone');
  const inDate   = document.getElementById('in-date');
  const inStatus = document.getElementById('in-status');
  const inMRR    = document.getElementById('in-mrr');

  inStatus.addEventListener('change', () => styleStatusSelect(inStatus, inStatus.value));

  addBtn.addEventListener('click', () => {
    const opening = !addRow.classList.contains('open');
    addRow.classList.toggle('open');
    addBtn.textContent = opening ? 'Save' : '+ Add Client';
    if (opening) {
      inDate.value = todayISO();
      inName.focus();
    } else {
      saveClient();
    }
  });

  [inName, inEmail, inPhone].forEach(inp => inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      saveClient();
      addRow.classList.remove('open');
      addBtn.textContent = '+ Add Client';
    }
  }));

  function saveClient() {
    const name  = inName.value.trim();
    const email = inEmail.value.trim();
    const phone = inPhone.value.trim();
    if (!name && !email && !phone) return;
    pushHistory();
    state.clients.push({
      name, email, phone,
      date: inDate.value,
      status: inStatus.value || (state.statuses[0] && state.statuses[0].name) || '',
      mrr: parseFloat(inMRR.value) || 0,
      adStatus: 'Not Live',
      clientStatus: 'Active'
    });
    inName.value = inEmail.value = inPhone.value = inMRR.value = '';
    saveState();
    render();
  }

  // ---- add status ----
  const statusForm  = document.getElementById('status-form');
  const statusName  = document.getElementById('status-name');
  const statusColor = document.getElementById('status-color');

  document.getElementById('add-status-btn').addEventListener('click', () => {
    statusForm.classList.toggle('open');
    if (statusForm.classList.contains('open')) statusName.focus();
  });

  function saveStatus() {
    const name = statusName.value.trim();
    if (!name) return;
    if (state.statuses.some(s => s.name.toLowerCase() === name.toLowerCase())) {
      alert('A status with that name already exists.');
      return;
    }
    pushHistory();
    state.statuses.push({ name, color: statusColor.value });
    statusName.value = '';
    saveState();
    render();
  }

  document.getElementById('status-save').addEventListener('click', saveStatus);
  statusName.addEventListener('keydown', e => { if (e.key === 'Enter') saveStatus(); });

  // ---- add task ----
  const addTaskBtn  = document.getElementById('add-task-btn');
  const taskAddRow  = document.getElementById('task-add-row');
  const tTask   = document.getElementById('t-task');
  const tStatus = document.getElementById('t-status');
  const tClient = document.getElementById('t-client');
  const tDate   = document.getElementById('t-date');
  const tNotes  = document.getElementById('t-notes');

  tStatus.addEventListener('change', () => applyTaskStatusStyle(tStatus));

  addTaskBtn.addEventListener('click', () => {
    const opening = !taskAddRow.classList.contains('open');
    taskAddRow.classList.toggle('open');
    addTaskBtn.textContent = opening ? 'Save' : '+ Add Task';
    if (opening) {
      fillClientOptions(tClient, '');
      tDate.value = todayISO();
      tTask.focus();
    } else {
      saveTask();
    }
  });

  [tTask, tNotes].forEach(inp => inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      saveTask();
      taskAddRow.classList.remove('open');
      addTaskBtn.textContent = '+ Add Task';
    }
  }));

  function saveTask() {
    const task = tTask.value.trim();
    if (!task) return;
    pushHistory();
    state.tasks.push({
      task,
      taskStatus: tStatus.value || 'To Do',
      client: tClient.value || '',
      dateDue: tDate.value,
      notes: tNotes.value.trim(),
      subtasks: [],
      expanded: false
    });
    tTask.value = tNotes.value = '';
    tDate.value = '';
    saveState();
    renderTasks();
  }

  // ---- undo wiring ----
  document.getElementById('undo-btn').addEventListener('click', undo);
  document.getElementById('redo-btn').addEventListener('click', redo);
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
  });

  // ---- pipeline board ----
  const PIPELINE_COLS = [
    { key: 'new',       label: 'New',       color: '#60a5fa' },
    { key: 'call-had',  label: 'Call Had',  color: '#f5b73d' },
    { key: 'upcoming',  label: 'Upcoming',  color: '#a78bfa' },
    { key: 'closed',    label: 'Closed',    color: '#4ade80' },
    { key: 'lost',      label: 'Lost',      color: '#f87171' }
  ];

  // drag state
  let psDraggingId = null;

  // active dropdown reference
  let psActiveDropdown = null;
  function psCloseDropdown() {
    if (psActiveDropdown) { psActiveDropdown.remove(); psActiveDropdown = null; }
  }
  document.addEventListener('click', psCloseDropdown);

  function renderPipeline() {
    const board = document.getElementById('pipeline-board');
    if (!board) return;
    board.innerHTML = '';
    PIPELINE_COLS.forEach(col => {
      const cards = state.pipeline.filter(c => c.column === col.key);
      const colEl = document.createElement('div');
      colEl.className = 'pipeline-col';

      const header = document.createElement('div');
      header.className = 'pipeline-col-header';
      const dot = document.createElement('div');
      dot.className = 'pipeline-col-dot';
      dot.style.background = col.color;
      const nameEl = document.createElement('span');
      nameEl.className = 'pipeline-col-name';
      nameEl.textContent = col.label;
      const countEl = document.createElement('span');
      countEl.className = 'pipeline-col-count';
      countEl.textContent = cards.length;
      header.appendChild(dot);
      header.appendChild(nameEl);
      header.appendChild(countEl);
      colEl.appendChild(header);

      const cardsEl = document.createElement('div');
      cardsEl.className = 'pipeline-cards';
      cards.forEach(card => {
        const cardEl = document.createElement('div');
        cardEl.className = 'pipeline-card';
        cardEl.draggable = true;
        cardEl.addEventListener('dragstart', e => {
          psDraggingId = card.id;
          setTimeout(() => cardEl.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        cardEl.addEventListener('dragend', () => {
          cardEl.classList.remove('dragging');
          psDraggingId = null;
          document.querySelectorAll('.pipeline-col').forEach(c => c.classList.remove('drag-over'));
        });

        const titleInp = document.createElement('input');
        titleInp.type = 'text';
        titleInp.className = 'pipeline-card-title';
        titleInp.value = card.title;
        titleInp.addEventListener('blur', () => {
          const val = titleInp.value.trim();
          if (!val) { titleInp.value = card.title; return; }
          if (val === card.title) return;
          pushHistory();
          const idx = state.pipeline.findIndex(c => c.id === card.id);
          if (idx !== -1) state.pipeline[idx].title = val;
          saveState();
        });
        titleInp.addEventListener('keydown', e => { if (e.key === 'Enter') titleInp.blur(); });

        const delBtn = document.createElement('span');
        delBtn.className = 'pipeline-card-del';
        delBtn.textContent = '×';
        delBtn.addEventListener('click', () => {
          pushHistory();
          state.pipeline = state.pipeline.filter(c => c.id !== card.id);
          saveState();
          renderPipeline();
        });

        cardEl.appendChild(titleInp);
        cardEl.appendChild(delBtn);

        // Status field badges
        if (state.pipelineStatusFields.length > 0) {
          const statusesEl = document.createElement('div');
          statusesEl.className = 'pipeline-card-statuses';
          state.pipelineStatusFields.forEach(field => {
            const selectedLabel = (card.statuses || {})[field.id];
            const selectedOpt = field.options.find(o => o.label === selectedLabel);
            const badge = document.createElement('button');
            badge.className = 'pipeline-status-badge' + (selectedOpt ? '' : ' ps-empty');
            badge.textContent = selectedOpt ? selectedOpt.label : field.label;
            if (selectedOpt) badge.style.background = selectedOpt.color;
            badge.addEventListener('click', e => {
              e.stopPropagation();
              psOpenDropdown(badge, card, field);
            });
            statusesEl.appendChild(badge);
          });
          cardEl.appendChild(statusesEl);
        }

        // Date + Notes
        const metaEl = document.createElement('div');
        metaEl.className = 'pipeline-card-meta';

        // First call date
        const dateRow = document.createElement('div');
        dateRow.className = 'pipeline-card-date-row';
        const dateLbl = document.createElement('span');
        dateLbl.className = 'pipeline-card-date-label';
        dateLbl.textContent = 'First call:';
        const dateText = document.createElement('span');
        dateText.className = 'pipeline-card-date-text' + (card.firstCallDate ? ' has-date' : '');
        dateText.textContent = card.firstCallDate ? formatAU(card.firstCallDate) : 'Set date';
        const dateInp = document.createElement('input');
        dateInp.type = 'date';
        dateInp.className = 'pipeline-card-date-input';
        dateInp.value = card.firstCallDate || '';
        dateInp.addEventListener('change', () => {
          pushHistory();
          const idx = state.pipeline.findIndex(c => c.id === card.id);
          if (idx !== -1) state.pipeline[idx].firstCallDate = dateInp.value;
          saveState();
          dateText.textContent = dateInp.value ? formatAU(dateInp.value) : 'Set date';
          dateText.classList.toggle('has-date', !!dateInp.value);
        });
        dateText.addEventListener('click', () => {
          dateInp.style.pointerEvents = 'auto';
          dateInp.showPicker ? dateInp.showPicker() : dateInp.click();
          dateInp.style.pointerEvents = 'none';
        });
        dateRow.appendChild(dateLbl);
        dateRow.appendChild(dateText);
        dateRow.appendChild(dateInp);
        metaEl.appendChild(dateRow);

        // Notes
        const notesEl = document.createElement('textarea');
        notesEl.className = 'pipeline-card-notes';
        notesEl.placeholder = 'Add a note…';
        notesEl.value = card.notes || '';
        notesEl.rows = 1;
        notesEl.addEventListener('input', () => {
          notesEl.style.height = 'auto';
          notesEl.style.height = notesEl.scrollHeight + 'px';
        });
        notesEl.addEventListener('blur', () => {
          const val = notesEl.value;
          if (val === (card.notes || '')) return;
          pushHistory();
          const idx = state.pipeline.findIndex(c => c.id === card.id);
          if (idx !== -1) state.pipeline[idx].notes = val;
          saveState();
        });
        // Auto-height on render
        setTimeout(() => {
          notesEl.style.height = 'auto';
          notesEl.style.height = notesEl.scrollHeight + 'px';
        }, 0);
        metaEl.appendChild(notesEl);

        cardEl.appendChild(metaEl);

        cardsEl.appendChild(cardEl);
      });
      colEl.appendChild(cardsEl);

      colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.classList.add('drag-over'); });
      colEl.addEventListener('dragleave', e => { if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over'); });
      colEl.addEventListener('drop', e => {
        e.preventDefault();
        colEl.classList.remove('drag-over');
        if (psDraggingId === null) return;
        const idx = state.pipeline.findIndex(c => c.id === psDraggingId);
        if (idx !== -1 && state.pipeline[idx].column !== col.key) {
          pushHistory();
          state.pipeline[idx].column = col.key;
          saveState();
          renderPipeline();
        }
      });

      const newBtn = document.createElement('div');
      newBtn.className = 'pipeline-new-card';
      newBtn.innerHTML = '<span>+</span><span>New page</span>';
      newBtn.addEventListener('click', () => addPipelineCard(col.key));
      colEl.appendChild(newBtn);

      board.appendChild(colEl);
    });
  }

  function psOpenDropdown(badge, card, field) {
    psCloseDropdown();
    const rect = badge.getBoundingClientRect();
    const dd = document.createElement('div');
    dd.className = 'pipeline-status-dropdown';
    dd.style.top = (rect.bottom + 4) + 'px';
    dd.style.left = rect.left + 'px';
    dd.style.minWidth = rect.width + 'px';
    dd.addEventListener('click', e => e.stopPropagation());

    const hdr = document.createElement('div');
    hdr.className = 'pipeline-sd-header';
    hdr.textContent = field.label;
    dd.appendChild(hdr);

    // Empty option
    const emptyOpt = document.createElement('div');
    emptyOpt.className = 'pipeline-sd-option';
    const emptyBar = document.createElement('div');
    emptyBar.className = 'pipeline-sd-option-bar ps-empty-bar';
    emptyBar.textContent = 'Empty';
    emptyOpt.appendChild(emptyBar);
    emptyOpt.addEventListener('click', () => {
      pushHistory();
      const idx = state.pipeline.findIndex(c => c.id === card.id);
      if (idx !== -1) {
        if (!state.pipeline[idx].statuses) state.pipeline[idx].statuses = {};
        delete state.pipeline[idx].statuses[field.id];
      }
      saveState(); renderPipeline(); psCloseDropdown();
    });
    dd.appendChild(emptyOpt);

    field.options.forEach(opt => {
      const optEl = document.createElement('div');
      optEl.className = 'pipeline-sd-option';
      const bar = document.createElement('div');
      bar.className = 'pipeline-sd-option-bar';
      bar.style.background = opt.color;
      bar.textContent = opt.label;
      optEl.appendChild(bar);
      optEl.addEventListener('click', () => {
        pushHistory();
        const idx = state.pipeline.findIndex(c => c.id === card.id);
        if (idx !== -1) {
          if (!state.pipeline[idx].statuses) state.pipeline[idx].statuses = {};
          state.pipeline[idx].statuses[field.id] = opt.label;
        }
        saveState(); renderPipeline(); psCloseDropdown();
      });
      dd.appendChild(optEl);
    });

    const div = document.createElement('div');
    div.className = 'pipeline-sd-divider';
    dd.appendChild(div);

    const editLink = document.createElement('div');
    editLink.className = 'pipeline-sd-edit';
    editLink.textContent = '✎ Edit Labels';
    editLink.addEventListener('click', () => { psCloseDropdown(); psOpenModal(field.id); });
    dd.appendChild(editLink);

    document.body.appendChild(dd);
    psActiveDropdown = dd;

    // Reposition if off-screen
    const dr = dd.getBoundingClientRect();
    if (dr.right > window.innerWidth) dd.style.left = (window.innerWidth - dr.width - 8) + 'px';
    if (dr.bottom > window.innerHeight) dd.style.top = (rect.top - dr.height - 4) + 'px';
  }

  // ---- status field modal ----
  let psEditingFieldId = null;
  let psModalOptions = [];

  function psOpenModal(fieldId) {
    psEditingFieldId = fieldId || null;
    const field = fieldId ? state.pipelineStatusFields.find(f => f.id === fieldId) : null;
    psModalOptions = field ? field.options.map(o => Object.assign({}, o)) : [
      { label: 'Done', color: '#00c875' },
      { label: 'Working on it', color: '#fdab3d' },
      { label: 'Stuck', color: '#e2445c' }
    ];
    document.getElementById('ps-modal-title').textContent = field ? 'Edit Status Column' : 'Add Status Column';
    document.getElementById('ps-modal-field-label').value = field ? field.label : '';
    document.getElementById('ps-modal-delete').classList.toggle('hidden', !field);
    psRenderModalOptions();
    document.getElementById('ps-modal-overlay').classList.remove('hidden');
  }

  function psRenderModalOptions() {
    const list = document.getElementById('ps-options-list');
    list.innerHTML = '';
    psModalOptions.forEach((opt, i) => {
      const row = document.createElement('div');
      row.className = 'ps-option-row';

      const colorPick = document.createElement('input');
      colorPick.type = 'color';
      colorPick.className = 'ps-color-pick';
      colorPick.value = opt.color;
      colorPick.style.background = opt.color;
      colorPick.addEventListener('input', () => {
        psModalOptions[i].color = colorPick.value;
        colorPick.style.background = colorPick.value;
      });

      const labelInp = document.createElement('input');
      labelInp.type = 'text';
      labelInp.className = 'ps-option-inp';
      labelInp.value = opt.label;
      labelInp.placeholder = 'Option label';
      labelInp.addEventListener('input', () => { psModalOptions[i].label = labelInp.value; });

      const del = document.createElement('span');
      del.className = 'ps-option-del';
      del.textContent = '×';
      del.addEventListener('click', () => { psModalOptions.splice(i, 1); psRenderModalOptions(); });

      row.appendChild(colorPick);
      row.appendChild(labelInp);
      row.appendChild(del);
      list.appendChild(row);
    });
  }

  function psCloseModal() {
    document.getElementById('ps-modal-overlay').classList.add('hidden');
    psEditingFieldId = null;
    psModalOptions = [];
  }

  document.getElementById('ps-modal-cancel').addEventListener('click', psCloseModal);
  document.getElementById('ps-modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) psCloseModal(); });

  document.getElementById('ps-add-option-btn').addEventListener('click', () => {
    psModalOptions.push({ label: '', color: '#579bfc' });
    psRenderModalOptions();
    const inputs = document.querySelectorAll('.ps-option-inp');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });

  document.getElementById('ps-modal-save').addEventListener('click', () => {
    const label = document.getElementById('ps-modal-field-label').value.trim();
    if (!label) { document.getElementById('ps-modal-field-label').focus(); return; }
    const opts = psModalOptions.filter(o => o.label.trim());
    pushHistory();
    if (psEditingFieldId) {
      const idx = state.pipelineStatusFields.findIndex(f => f.id === psEditingFieldId);
      if (idx !== -1) { state.pipelineStatusFields[idx].label = label; state.pipelineStatusFields[idx].options = opts; }
    } else {
      state.pipelineStatusFields.push({ id: Date.now(), label, options: opts });
    }
    saveState(); renderPipeline(); psCloseModal();
  });

  document.getElementById('ps-modal-delete').addEventListener('click', () => {
    if (!psEditingFieldId) return;
    pushHistory();
    state.pipelineStatusFields = state.pipelineStatusFields.filter(f => f.id !== psEditingFieldId);
    state.pipeline.forEach(c => { if (c.statuses) delete c.statuses[psEditingFieldId]; });
    saveState(); renderPipeline(); psCloseModal();
  });

  document.getElementById('pipeline-add-status-btn').addEventListener('click', () => psOpenModal(null));

  function addPipelineCard(column) {
    pushHistory();
    state.pipeline.push({ id: Date.now(), title: 'Untitled', column, statuses: {} });
    saveState();
    renderPipeline();
    const board = document.getElementById('pipeline-board');
    const colIdx = PIPELINE_COLS.findIndex(c => c.key === column);
    const cols = board.querySelectorAll('.pipeline-col');
    if (cols[colIdx]) {
      const inputs = cols[colIdx].querySelectorAll('.pipeline-card-title');
      if (inputs.length) inputs[inputs.length - 1].select();
    }
  }

  document.getElementById('pipeline-new-btn').addEventListener('click', () => addPipelineCard('new'));
  document.getElementById('pipeline-new-caret').addEventListener('click', () => addPipelineCard('new'));

  // ---- settings: user management ----
  function renderUserList() {
    const users = loadUsers();
    const list = document.getElementById('user-list');
    list.innerHTML = '';
    users.forEach((u, idx) => {
      const row = document.createElement('div');
      row.className = 'user-row';
      const left = document.createElement('span');
      left.className = 'user-email';
      left.textContent = u.email;
      if (u.admin) {
        const badge = document.createElement('span');
        badge.className = 'user-badge';
        badge.textContent = 'Admin';
        left.appendChild(badge);
      }
      row.appendChild(left);
      if (!u.admin) {
        const del = document.createElement('span');
        del.className = 'row-delete';
        del.textContent = 'x';
        del.title = 'Remove user';
        del.addEventListener('click', () => {
          const users2 = loadUsers();
          users2.splice(idx, 1);
          saveUsers(users2);
          renderUserList();
          showSettingsMsg('User removed', 'ok');
        });
        row.appendChild(del);
      }
      list.appendChild(row);
    });
  }

  function showSettingsMsg(text, type) {
    const el = document.getElementById('settings-msg');
    el.textContent = text;
    el.className = 'settings-msg ' + type;
    setTimeout(() => { el.textContent = ''; el.className = 'settings-msg'; }, 3000);
  }

  document.getElementById('add-user-btn').addEventListener('click', () => {
    const email = document.getElementById('new-user-email').value.trim();
    const password = document.getElementById('new-user-password').value;
    if (!email || !password) { showSettingsMsg('Email and password required', 'err'); return; }
    const users = loadUsers();
    if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
      showSettingsMsg('User already exists', 'err'); return;
    }
    users.push({ email, password, admin: false });
    saveUsers(users);
    document.getElementById('new-user-email').value = '';
    document.getElementById('new-user-password').value = '';
    renderUserList();
    showSettingsMsg('User added', 'ok');
  });

  // ---- auth ----
  const loginOverlay  = document.getElementById('login-overlay');
  const loginEmailEl  = document.getElementById('login-email');
  const loginPassword = document.getElementById('login-password');
  const loginError    = document.getElementById('login-error');

  function isLoggedIn() {
    return sessionStorage.getItem(SESSION_KEY) === 'true';
  }

  function showDashboard() {
    loginOverlay.classList.add('hidden');
  }

  function showLogin(msg) {
    loginOverlay.classList.remove('hidden');
    loginEmailEl.value = '';
    loginPassword.value = '';
    loginError.textContent = msg || '';
    loginEmailEl.focus();
  }

  function attemptLogin() {
    const email = loginEmailEl.value.trim();
    const pass  = loginPassword.value;
    const users = loadUsers();
    const match = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === pass);
    if (match) {
      sessionStorage.setItem(SESSION_KEY, 'true');
      showDashboard();
    } else {
      loginError.textContent = 'Invalid credentials';
      loginPassword.value = '';
      loginPassword.focus();
    }
  }

  document.getElementById('login-submit').addEventListener('click', attemptLogin);
  [loginEmailEl, loginPassword].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); })
  );

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem(SESSION_KEY);
    showLogin();
  });

  // ---- init ----
  loadState();

  if (!state.pipelineSeededV1) {
    const seed = [
      'Maurice Palazzolo','Leon Potter','Dylan Grubb','Mike Fernandez',
      'Ali Ali','Haris Medzic','Jody Day','Kabindra shakya',
      'Chay','Robert','Mlichael Wilson','Ayaz Mohammed',
      'Frank Turcino','Saphira Thomsen Grant','Leah Gallin','Andrew Jax',
      'Abhay','Jason Green','Rhaksha','Zad Hossain',
      'John','Suleiman Ali'
    ];
    seed.forEach((name, i) => {
      state.pipeline.push({ id: Date.now() + i, title: name, column: 'new', statuses: {} });
    });
    state.pipelineSeededV1 = true;
    saveState();
  }

  render();
  if (isLoggedIn()) {
    showDashboard();
  } else {
    loginEmailEl.focus();
  }
</script>
</body>
</html>
